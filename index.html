<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr. Circolone Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #chat-container {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
    }
    #chat-header {
      background: linear-gradient(135deg, #1a3c6e, #2e6abf);
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #chat-header .info h2 { font-size: 1.1rem; font-weight: 700; }
    #chat-header .info p { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .message.bot {
      background: #eef2f9;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.user {
      background: #2e6abf;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: #eef2f9;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }
    .typing span {
      width: 8px; height: 8px;
      background: #2e6abf;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    #input-area {
      padding: 16px;
      border-top: 1px solid #e5e9f0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #userInput {
      flex: 1;
      border: 1.5px solid #d0d7e3;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 110px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #userInput:focus { border-color: #2e6abf; }
    #sendBtn {
      background: #2e6abf;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
      height: 46px;
    }
    #sendBtn:hover { background: #1a3c6e; }
    #sendBtn:disabled { background: #a0b4d0; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <div class="info">
      <h2>Dr. Circolone — Apple Rehab Group</h2>
      <p>Board-Certified Chiropractic Orthopedist · Chattanooga, TN</p>
    </div>
  </div>
  <div id="messages">
    <div class="message bot">
      Hi! I'm Dr. Circolone's virtual assistant. I can answer questions about Apple Rehab Group, chiropractic orthopedics, our services, and Dr. Circolone's books and podcast. How can I help you today?
    </div>
  </div>
  <div id="input-area">
    <textarea id="userInput" rows="1" placeholder="Type your question..."></textarea>
    <button id="sendBtn" type="button">Send</button>
  </div>
</div>

<script>
  const SERVER_URL = 'https://dr-nick-chatbot.onrender.com';

  function addMessage(text, sender) {
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage(text, 'user');
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(SERVER_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.reply || 'Sorry, I could not get a response.', 'bot');
    } catch (err) {
      removeTyping();
      addMessage('Sorry, there was a connection error. Please try again.', 'bot');
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }

  document.getElementById('sendBtn').onclick = sendMessage;

  document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
